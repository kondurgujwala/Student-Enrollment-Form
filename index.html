<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Enrollment Form</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>

    <script src="index.js"></script>

    <style>
        body{
            background: linear-gradient(135deg,#e3f2fd,#f5f7fa);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .container{
            max-width: 900px;
        }

        .card{
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }

        .card-header{
            background: linear-gradient(135deg,#007bff,#0056b3);
            padding: 25px;
        }

        .card-body{
            padding: 35px;
        }

        .form-group{
            margin-bottom: 20px;
        }

        .form-group label{
            font-weight: 600;
            color: #333;
        }

        .form-control{
            height: 50px;
            border-radius: 12px;
            border: 1px solid #ced4da;
            font-size: 15px;
        }

        .form-control:focus{
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0,123,255,0.25);
        }

        textarea.form-control{
            height: 100px !important;
            padding-top: 10px;
        }

        .btn{
            border-radius: 12px;
            padding: 10px 28px;
            font-weight: 600;
            margin: 5px;
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
            color:#777;
            font-size:14px;
        }
    </style>

</head>

<body>

<div class="container mt-5 mb-5">

    <div class="card shadow-lg">

        <div class="card-header text-white text-center">
            <h2>🎓 Student Enrollment Form</h2>
            <p class="mb-0">JsonPowerDB Student Management System</p>
        </div>

        <div class="card-body">

            <form id="studentForm">

                <div class="form-group">
                    <label for="rollNo">Roll No</label>
                    <input type="text"
                           class="form-control"
                           id="rollNo"
                           placeholder="Enter Roll Number"
                           onchange="getStudent()">
                </div>

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text"
                           class="form-control"
                           id="fullName"
                           placeholder="Enter Full Name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email"
                           class="form-control"
                           id="email"
                           placeholder="Enter Email Address">
                </div>

                <div class="form-group">
                    <label for="mobileNo">Mobile Number</label>
                    <input type="tel"
                           class="form-control"
                           id="mobileNo"
                           placeholder="Enter Mobile Number">
                </div>

                <div class="form-group">
                    <label for="studentClass">Program / Year</label>

                    <select class="form-control" id="studentClass">

                        <option value="">Select Program</option>

                        <optgroup label="Undergraduate">
                            <option>B.Tech CE - Year 1</option>
                            <option>B.Tech CE - Year 2</option>
                            <option>B.Tech CE - Year 3</option>
                            <option>B.Tech CE - Year 4</option>

                            <option>B.Tech CSE - Year 1</option>
                            <option>B.Tech CSE - Year 2</option>
                            <option>B.Tech CSE - Year 3</option>
                            <option>B.Tech CSE - Year 4</option>
                        </optgroup>

                        <optgroup label="Postgraduate">
                            <option>M.Tech - Year 1</option>
                            <option>M.Tech - Year 2</option>

                            <option>MBA - Year 1</option>
                            <option>MBA - Year 2</option>

                            <option>MCA - Year 1</option>
                            <option>MCA - Year 2</option>
                        </optgroup>

                    </select>
                </div>

                <div class="form-group">
                    <label for="birthDate">Birth Date</label>
                    <input type="date"
                           class="form-control"
                           id="birthDate">
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea class="form-control"
                              id="address"
                              placeholder="Enter Address"></textarea>
                </div>

                <div class="form-group">
                    <label for="enrollmentDate">Enrollment Date</label>
                    <input type="date"
                           class="form-control"
                           id="enrollmentDate">
                </div>

                <div class="text-center mt-4">

                    <button type="button"
                            class="btn btn-success"
                            id="save"
                            onclick="saveStudent()">
                        Save
                    </button>

                    <button type="button"
                            class="btn btn-warning text-white"
                            id="update"
                            onclick="updateStudent()">
                        Update
                    </button>

                    <button type="button"
                            class="btn btn-danger"
                            id="reset"
                            onclick="resetForm()">
                        Reset
                    </button>

                </div>

                <div class="footer-text">
                    Developed using HTML, JavaScript, Bootstrap & JsonPowerDB
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
